<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{TITLE}} · 分享入口</title>
    <style>
      body {
        margin: 0;
        font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        background: linear-gradient(180deg, #f7f2ea 0%, #f2ece4 100%);
        color: #2b241d;
      }
      .shell {
        width: min(960px, calc(100% - 24px));
        margin: 0 auto;
        padding: 32px 0 40px;
      }
      .hero,
      .group {
        background: rgba(255, 250, 244, 0.94);
        border: 1px solid rgba(43, 36, 29, 0.08);
        border-radius: 24px;
        padding: 24px;
        box-shadow: 0 16px 36px rgba(43, 36, 29, 0.08);
      }
      .hero {
        margin-bottom: 18px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }
      .group h2 {
        margin: 0 0 12px;
        font-family: "STKaiti", "KaiTi", serif;
      }
      a {
        display: block;
        margin-bottom: 10px;
        color: inherit;
        text-decoration: none;
        padding: 12px 14px;
        border-radius: 16px;
        background: #fff;
        border: 1px solid rgba(43, 36, 29, 0.08);
      }
      @media (max-width: 720px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <section class="hero">
        <p>Travel Skill V2</p>
        <h1>{{TITLE}}</h1>
        <p>{{SUMMARY}}</p>
      </section>
      <div class="grid">
        <section class="group">
          <h2>桌面端</h2>
          {{DESKTOP_LINKS}}
        </section>
        <section class="group">
          <h2>手机端</h2>
          {{MOBILE_LINKS}}
        </section>
        <section class="group">
          <h2>单文件分享</h2>
          {{SHARE_LINKS}}
        </section>
      </div>
    </div>
  </body>
</html>
