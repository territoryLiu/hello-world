<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{TITLE}} · {{LAYER_TITLE}} / Mobile</title>
    <style>
      :root {
        --bg: #EAE6DF;
        --card-bg: rgba(246, 244, 240, 0.95);
        --text: #4A4540;
        --text-light: #7E776F;
        --accent: #8C9982;
        --stamp: #A45D5D;
        --shadow: 0 8px 24px rgba(74, 69, 64, 0.08);
        --r: 20px;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; font-family: "Kaiti SC", "STKaiti", "Songti SC", serif;
        color: var(--text); line-height: 2; background-color: var(--bg);
        letter-spacing: 0.05em; overflow-x: hidden;
      }
      .page-shell { display: flex; flex-direction: column; height: 100vh; }
      
      .hero-mobile { padding: 48px 24px 32px; text-align: center; flex-shrink: 0; position: relative; }
      .hero-mobile::after { content: ""; display: block; width: 1px; height: 40px; background: var(--text-light); margin: 24px auto 0; opacity: 0.3; }
      .eyebrow { font-size: 12px; color: var(--text-light); letter-spacing: 0.2em; margin: 0 0 16px; writing-mode: vertical-rl; position: absolute; left: 16px; top: 40px; opacity: 0.5; }
      .hero-mobile h1 { font-size: 32px; font-weight: normal; margin: 0 0 12px; letter-spacing: 0.1em; color: var(--text); }
      .layer-title { font-size: 16px; color: var(--accent); margin: 0 0 16px; }
      .hero-summary { font-size: 14px; color: var(--text-light); margin: 0 0 20px; padding: 0 20px; }
      .meta-row { display: flex; flex-direction: column; gap: 8px; font-size: 12px; color: var(--text-light); }
      .meta-chip { display: flex; justify-content: space-between; border-bottom: 1px dashed rgba(126, 119, 111, 0.2); padding-bottom: 4px; }
      
      .content-shell { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
      
      .section-nav { 
        display: flex; overflow-x: auto; padding: 16px 24px; background: transparent; 
        z-index: 10; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
        flex-shrink: 0; gap: 16px; align-items: center;
      }
      .section-nav::-webkit-scrollbar { display: none; }
      .section-nav a { 
        color: var(--text); text-decoration: none; font-size: 15px; padding: 8px 16px; 
        white-space: nowrap; scroll-snap-align: center; border-radius: 999px;
        background: var(--card-bg); box-shadow: var(--shadow); border: 1px solid transparent;
        transition: all 0.3s;
      }
      .section-nav a.active { color: var(--stamp); border-color: rgba(164, 93, 93, 0.3); }
      
      .sections-container { flex: 1; overflow-y: auto; padding: 0 20px 60px; }
      
      .section-block { display: none; animation: fadeInZen 0.5s ease; }
      .section-block.active { display: block; }
      @keyframes fadeInZen { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
      
      .section-head { text-align: center; margin-bottom: 32px; padding-top: 20px; }
      .section-head h2 { font-size: 24px; font-weight: normal; color: var(--text); margin: 0 0 8px; position: relative; display: inline-block; }
      .section-head h2::after { content: "卷"; position: absolute; right: -24px; top: -8px; font-size: 10px; color: var(--stamp); border: 1px solid var(--stamp); padding: 1px 3px; border-radius: 2px; transform: rotate(5deg); opacity: 0.8; }
      .section-lead { font-size: 13px; color: var(--text-light); margin: 0; }
      
      .section-body { display: flex; flex-direction: column; gap: 24px; }
      .card { background: var(--card-bg); border-radius: var(--r); padding: 24px; box-shadow: var(--shadow); position: relative; overflow: hidden; }
      .card::before { content: ""; position: absolute; top: -10%; right: -10%; width: 100px; height: 100px; background: radial-gradient(circle, var(--accent) 0%, transparent 70%); opacity: 0.05; border-radius: 50%; }
      .card-header h3 { font-size: 18px; font-weight: normal; margin: 0 0 12px; color: var(--accent); border-bottom: 1px solid rgba(140, 153, 130, 0.2); padding-bottom: 8px; }
      .card-summary { font-size: 14px; margin: 0; color: var(--text); }
      .card-points { margin: 12px 0 0; padding-left: 0; font-size: 14px; color: var(--text-light); list-style: none; }
      .card-points li { margin-bottom: 8px; position: relative; padding-left: 16px; }
      .card-points li::before { content: "·"; position: absolute; left: 0; color: var(--accent); }
      
      .source-card { background: transparent; border-bottom: 1px dashed rgba(74, 69, 64, 0.15); padding: 16px 0; }
      .source-header h3 { font-size: 15px; font-weight: normal; margin: 0 0 4px; color: var(--text); }
      .source-meta { font-size: 12px; color: var(--text-light); margin: 0 0 4px; }
      .source-url { font-size: 12px; color: var(--accent); word-break: break-all; }
      .source-badge { font-size: 10px; color: var(--stamp); border: 1px solid rgba(164, 93, 93, 0.3); padding: 2px 4px; border-radius: 2px; margin-left: 8px; }
    </style>
  </head>
  <body data-device="{{DEVICE}}" data-layer="{{LAYER}}">
    <div class="page-shell">
      <header class="hero hero-mobile">
        <p class="eyebrow">Zen / Mobile</p>
        <h1>{{TITLE}}</h1>
        <p class="layer-title">{{LAYER_TITLE}}</p>
        <p class="hero-summary">{{SUMMARY}}</p>
        <div class="meta-row">{{META_CHIPS}}</div>
      </header>
      <main class="content-shell mobile-shell">
        <nav class="section-nav" id="mobile-nav">{{NAV_ITEMS}}</nav>
        <div class="sections-container" id="sections-container">
          {{SECTION_CONTENT}}
        </div>
      </main>
    </div>
    
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const navLinks = document.querySelectorAll('#mobile-nav a');
        const sections = document.querySelectorAll('.section-block');
        
        function activateSection(hash) {
          if (!hash) return;
          navLinks.forEach(link => {
            if (link.getAttribute('href') === hash) {
              link.classList.add('active');
              link.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
            } else {
              link.classList.remove('active');
            }
          });
          sections.forEach(sec => {
            if ('#' + sec.id === hash) sec.classList.add('active');
            else sec.classList.remove('active');
          });
        }
        
        navLinks.forEach(link => {
          link.addEventListener('click', (e) => {
            e.preventDefault();
            const hash = link.getAttribute('href');
            history.pushState(null, null, hash);
            activateSection(hash);
            document.getElementById('sections-container').scrollTop = 0;
          });
        });
        
        if (window.location.hash && document.querySelector(window.location.hash)) {
          activateSection(window.location.hash);
        } else if (navLinks.length > 0) {
          activateSection(navLinks[0].getAttribute('href'));
        }
      });
    </script>
    <script src="../../assets/guide-content.js"></script>
    <script src="../../assets/render-guide.js"></script>
  </body>
</html>
