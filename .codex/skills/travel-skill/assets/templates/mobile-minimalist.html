<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{TITLE}} · {{LAYER_TITLE}} / Mobile</title>
    <style>
      :root {
        --bg: #ffffff;
        --text: #111111;
        --gray: #666666;
        --accent: #0055FF;
        --warn: #FF4500;
        --line: #222222;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; font-family: "Inter", "Helvetica Neue", Helvetica, Arial, sans-serif;
        color: var(--text); line-height: 1.5; background-color: var(--bg);
        letter-spacing: -0.02em; overflow-x: hidden;
      }
      .page-shell { display: flex; flex-direction: column; height: 100vh; }
      
      .hero-mobile { padding: 32px 20px 24px; border-bottom: 4px solid var(--text); background: var(--bg); flex-shrink: 0; }
      .eyebrow { font-size: 10px; font-weight: 900; color: var(--gray); text-transform: uppercase; letter-spacing: 0.1em; margin: 0 0 16px; }
      .hero-mobile h1 { font-size: 40px; font-weight: 900; line-height: 1; margin: 0 0 12px; letter-spacing: -0.05em; text-transform: uppercase; }
      .layer-title { font-size: 14px; font-weight: 700; color: var(--accent); margin: 0 0 16px; text-transform: uppercase; }
      .hero-summary { font-size: 14px; color: var(--text); margin: 0 0 20px; border-left: 2px solid var(--accent); padding-left: 12px; }
      .meta-row { display: flex; flex-direction: column; gap: 8px; border-top: 1px solid var(--text); padding-top: 16px; }
      .meta-chip { font-size: 12px; font-weight: 700; text-transform: uppercase; display: flex; justify-content: space-between; }
      .meta-chip strong { color: var(--gray); }
      
      .content-shell { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
      
      .section-nav { 
        display: flex; overflow-x: auto; padding: 16px 20px; background: var(--bg); 
        border-bottom: 2px solid var(--text); z-index: 10;
        scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
        flex-shrink: 0; gap: 24px;
      }
      .section-nav::-webkit-scrollbar { display: none; }
      .section-nav a { 
        color: var(--gray); text-decoration: none; font-size: 12px; font-weight: 900; 
        white-space: nowrap; scroll-snap-align: start; text-transform: uppercase;
        border-bottom: 2px solid transparent; padding-bottom: 4px;
      }
      .section-nav a.active { color: var(--text); border-color: var(--accent); }
      
      .sections-container { flex: 1; overflow-y: auto; padding: 24px 20px 60px; }
      
      .section-block { display: none; animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
      .section-block.active { display: block; }
      @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
      
      .section-head h2 { font-size: 28px; font-weight: 900; color: var(--text); margin: 0 0 8px; text-transform: uppercase; }
      .section-lead { font-size: 14px; color: var(--gray); margin: 0 0 24px; font-weight: 500; }
      
      .section-body { display: flex; flex-direction: column; gap: 20px; }
      .card { background: var(--bg); border: 2px solid var(--text); padding: 20px; transition: transform 0.2s, box-shadow 0.2s; }
      .card:active { transform: translateY(-4px); box-shadow: 4px 4px 0 var(--accent); }
      .card-header h3 { font-size: 18px; font-weight: 800; margin: 0 0 8px; text-transform: uppercase; }
      .card-summary { font-size: 14px; margin: 0; font-weight: 500; }
      .card-points { margin: 16px 0 0; padding-left: 20px; font-size: 14px; color: var(--gray); }
      .card-points li { margin-bottom: 8px; }
      
      .source-card { background: var(--bg); border: 1px solid var(--line); padding: 16px; border-left: 4px solid var(--text); }
      .source-header h3 { font-size: 14px; font-weight: 800; margin: 0 0 8px; text-transform: uppercase; }
      .source-meta { font-size: 11px; font-weight: 700; color: var(--gray); margin: 0 0 4px; text-transform: uppercase; }
      .source-url { font-size: 12px; color: var(--accent); word-break: break-all; font-weight: 500; }
      .source-badge { display: inline-block; font-size: 10px; background: var(--text); color: #fff; padding: 2px 6px; font-weight: 700; margin-bottom: 8px; }
    </style>
  </head>
  <body data-device="{{DEVICE}}" data-layer="{{LAYER}}">
    <div class="page-shell">
      <header class="hero hero-mobile">
        <p class="eyebrow">Minimalist / Mobile</p>
        <h1>{{TITLE}}</h1>
        <p class="layer-title">{{LAYER_TITLE}}</p>
        <p class="hero-summary">{{SUMMARY}}</p>
        <div class="meta-row">{{META_CHIPS}}</div>
      </header>
      <main class="content-shell mobile-shell">
        <nav class="section-nav" id="mobile-nav">{{NAV_ITEMS}}</nav>
        <div class="sections-container" id="sections-container">
          {{SECTION_CONTENT}}
        </div>
      </main>
    </div>
    
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const navLinks = document.querySelectorAll('#mobile-nav a');
        const sections = document.querySelectorAll('.section-block');
        
        function activateSection(hash) {
          if (!hash) return;
          navLinks.forEach(link => {
            if (link.getAttribute('href') === hash) {
              link.classList.add('active');
              link.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            } else {
              link.classList.remove('active');
            }
          });
          sections.forEach(sec => {
            if ('#' + sec.id === hash) sec.classList.add('active');
            else sec.classList.remove('active');
          });
        }
        
        navLinks.forEach(link => {
          link.addEventListener('click', (e) => {
            e.preventDefault();
            const hash = link.getAttribute('href');
            history.pushState(null, null, hash);
            activateSection(hash);
            document.getElementById('sections-container').scrollTop = 0;
          });
        });
        
        if (window.location.hash && document.querySelector(window.location.hash)) {
          activateSection(window.location.hash);
        } else if (navLinks.length > 0) {
          activateSection(navLinks[0].getAttribute('href'));
        }
      });
    </script>
    <script src="../../assets/guide-content.js"></script>
    <script src="../../assets/render-guide.js"></script>
  </body>
</html>
