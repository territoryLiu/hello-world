<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{TITLE}} · {{LAYER_TITLE}}</title>
    <link rel="stylesheet" href="../../assets/base.css" />
  </head>
  <body data-device="{{DEVICE}}" data-layer="{{LAYER}}">
    <div class="page-shell">
      <header class="hero">
        <p class="eyebrow">Travel Skill V2</p>
        <div class="hero-grid">
          <div class="hero-copy">
            <h1>{{TITLE}}</h1>
            <p class="layer-title">{{LAYER_TITLE}}</p>
            <p class="hero-summary">{{SUMMARY}}</p>
            <div class="meta-row">{{META_CHIPS}}</div>
          </div>
          <aside class="hero-panel">
            <h2>阅读说明</h2>
            <p>桌面端适合完整浏览路线、景点、交通与来源。</p>
          </aside>
        </div>
      </header>
      <main class="content-shell">
        <nav class="section-nav">{{NAV_ITEMS}}</nav>
        {{SECTION_CONTENT}}
      </main>
    </div>
    <script src="../../assets/guide-content.js"></script>
    <script src="../../assets/render-guide.js"></script>
  </body>
</html>
