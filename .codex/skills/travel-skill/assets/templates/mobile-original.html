<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{TITLE}} · {{LAYER_TITLE}} / Mobile</title>
    <style>
      :root {
        --bg: #f4efe5;
        --card: rgba(255,250,243,.84);
        --ink: #1e241f;
        --muted: #5f685f;
        --green: #294231;
        --deep: #15231a;
        --red: #bb5439;
        --line: rgba(30,36,31,.1);
        --shadow: 0 12px 24px rgba(21,35,26,.08);
        --r: 20px;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; font-family: "Baskerville Old Face", Georgia, "Songti SC", serif;
        color: var(--ink); line-height: 1.6; background-color: var(--bg);
        background-image: linear-gradient(rgba(30,36,31,.015) 1px, transparent 1px), linear-gradient(90deg, rgba(30,36,31,.015) 1px, transparent 1px);
        background-size: 18px 18px;
        overflow-x: hidden;
      }
      .page-shell { display: flex; flex-direction: column; height: 100vh; }
      
      .hero-mobile { padding: 40px 20px 32px; background: linear-gradient(180deg, #f8f3ea, #efe6d8); position: relative; flex-shrink: 0; border-bottom: 1px solid var(--line); }
      .eyebrow { font-size: 11px; color: var(--green); text-transform: uppercase; letter-spacing: 0.1em; display: inline-block; padding: 4px 12px; border-radius: 999px; background: rgba(41,66,49,.08); margin: 0 0 16px; }
      .hero-mobile h1 { font-size: 36px; line-height: 1.1; margin: 0 0 12px; font-weight: normal; color: var(--deep); letter-spacing: -0.05em; }
      .layer-title { font-size: 15px; color: var(--muted); margin: 0 0 16px; }
      .hero-summary { font-size: 15px; color: var(--muted); margin: 0 0 24px; background: rgba(255,255,255,0.5); padding: 12px 16px; border-radius: 12px; border: 1px solid var(--line); }
      .meta-row { display: flex; gap: 8px; flex-wrap: wrap; }
      .meta-chip { font-size: 12px; padding: 6px 12px; border-radius: 999px; border: 1px solid var(--line); background: rgba(255,249,240,.66); color: var(--muted); }
      .meta-chip strong { display: none; }
      
      .content-shell { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
      
      .section-nav { 
        display: flex; overflow-x: auto; padding: 12px 20px; background: rgba(255,248,240,.78); 
        backdrop-filter: blur(16px); z-index: 10; box-shadow: 0 4px 12px rgba(21,35,26,.04);
        scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
        flex-shrink: 0; gap: 8px; border-bottom: 1px solid var(--line);
      }
      .section-nav::-webkit-scrollbar { display: none; }
      .section-nav a { 
        color: var(--muted); text-decoration: none; font-size: 14px; padding: 8px 16px; 
        white-space: nowrap; scroll-snap-align: center; border-radius: 999px;
        background: transparent; transition: all 0.3s; border: 1px solid transparent;
      }
      .section-nav a.active { background: rgba(41,66,49,.08); color: var(--green); border-color: rgba(41,66,49,.1); }
      
      .sections-container { flex: 1; overflow-y: auto; padding: 24px 20px 60px; }
      
      .section-block { display: none; animation: slideUp 0.4s ease; }
      .section-block.active { display: block; }
      @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
      
      .section-head { margin-bottom: 20px; }
      .section-head h2 { font-size: 26px; font-weight: normal; color: var(--deep); margin: 0 0 8px; letter-spacing: -0.03em; }
      .section-lead { font-size: 14px; color: var(--muted); margin: 0; }
      
      .section-body { display: flex; flex-direction: column; gap: 16px; }
      .card { background: var(--card); border: 1px solid var(--line); padding: 20px; border-radius: var(--r); box-shadow: var(--shadow); }
      .card-header h3 { font-size: 18px; margin: 0 0 8px; font-weight: normal; color: var(--green); }
      .card-summary { font-size: 14px; margin: 0; color: var(--muted); }
      .card-points { margin: 12px 0 0; padding-left: 20px; font-size: 14px; color: var(--ink); }
      .card-points li { margin-bottom: 6px; }
      
      .source-card { background: var(--card); border: 1px solid var(--line); padding: 16px; border-radius: 16px; }
      .source-header h3 { font-size: 15px; font-weight: normal; margin: 0 0 6px; color: var(--deep); }
      .source-meta { font-size: 12px; color: var(--muted); margin: 0 0 4px; }
      .source-url { font-size: 13px; color: var(--green); word-break: break-all; text-decoration: underline; }
      .source-badge { font-size: 10px; background: rgba(41,66,49,.08); color: var(--green); padding: 2px 8px; border-radius: 999px; margin-left: 8px; }
    </style>
  </head>
  <body data-device="{{DEVICE}}" data-layer="{{LAYER}}">
    <div class="page-shell">
      <header class="hero hero-mobile">
        <p class="eyebrow">Original / Mobile</p>
        <h1>{{TITLE}}</h1>
        <p class="layer-title">{{LAYER_TITLE}}</p>
        <p class="hero-summary">{{SUMMARY}}</p>
        <div class="meta-row">{{META_CHIPS}}</div>
      </header>
      <main class="content-shell mobile-shell">
        <nav class="section-nav" id="mobile-nav">{{NAV_ITEMS}}</nav>
        <div class="sections-container" id="sections-container">
          {{SECTION_CONTENT}}
        </div>
      </main>
    </div>
    
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const navLinks = document.querySelectorAll('#mobile-nav a');
        const sections = document.querySelectorAll('.section-block');
        
        function activateSection(hash) {
          if (!hash) return;
          navLinks.forEach(link => {
            if (link.getAttribute('href') === hash) {
              link.classList.add('active');
              link.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
            } else {
              link.classList.remove('active');
            }
          });
          sections.forEach(sec => {
            if ('#' + sec.id === hash) sec.classList.add('active');
            else sec.classList.remove('active');
          });
        }
        
        navLinks.forEach(link => {
          link.addEventListener('click', (e) => {
            e.preventDefault();
            const hash = link.getAttribute('href');
            history.pushState(null, null, hash);
            activateSection(hash);
            document.getElementById('sections-container').scrollTop = 0;
          });
        });
        
        if (window.location.hash && document.querySelector(window.location.hash)) {
          activateSection(window.location.hash);
        } else if (navLinks.length > 0) {
          activateSection(navLinks[0].getAttribute('href'));
        }
      });
    </script>
    <script src="../../assets/guide-content.js"></script>
    <script src="../../assets/render-guide.js"></script>
  </body>
</html>
